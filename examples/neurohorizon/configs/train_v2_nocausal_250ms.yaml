defaults:
  - defaults.yaml
  - model: neurohorizon_small_250ms_noar.yaml
  - dataset: perich_miller_10sessions.yaml
  - _self_

data_root: /root/autodl-tmp/NeuroHorizon/data/processed/
log_dir: /root/autodl-tmp/NeuroHorizon/results/logs/phase1_v2_nocausal_250ms_cont

epochs: 300
batch_size: 64
eval_epochs: 10
seed: 42

precision: bf16-mixed

train_transforms:
  - _target_: torch_brain.transforms.UnitDropout
    max_units: 200
    min_units: 30
    mode_units: 80
    peak: 4

wandb:
  enable: false
  run_name: v2_nocausal_250ms_cont
