# NeuroHorizon Option 2A latent diffusion model config - 500ms prediction window
_target_: torch_brain.models.NeuroHorizon
sequence_length: 1.0
pred_window: 0.500
bin_size: 0.020
latent_step: 0.05
num_latents_per_step: 32
dim: 128
enc_depth: 6
dec_depth: 4
dim_head: 64
cross_heads: 2
self_heads: 8
ffn_dropout: 0.2
lin_dropout: 0.4
atn_dropout: 0.2
max_pred_bins: 50
feedback_method: none
decoder_variant: latent_diffusion
flow_target_space: log1p_count
flow_match_mode: rectified
flow_steps_eval: 20
flow_solver: euler
conditioning_dropout: 0.1
flow_eval_seed: 42
latent_ae_depth: 2
latent_factor_units: 16
latent_recon_weight: 1.0
latent_diffusion_weight: 1.0
