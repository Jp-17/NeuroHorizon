# NeuroHorizon decoder-scheduled-sampling base model config - 500ms prediction window
_target_: torch_brain.models.NeuroHorizon
sequence_length: 1.0
pred_window: 0.500
bin_size: 0.020
latent_step: 0.05
num_latents_per_step: 32
dim: 128
enc_depth: 6
dec_depth: 2
dim_head: 64
cross_heads: 2
self_heads: 8
ffn_dropout: 0.2
lin_dropout: 0.4
atn_dropout: 0.2
max_pred_bins: 50
feedback_method: none
decoder_variant: local_prediction_memory
prediction_memory_k: 4
prediction_memory_heads: 4
prediction_memory_train_mix_prob: 0.35
prediction_memory_input_dropout: 0.05
prediction_memory_input_noise_std: 0.03
decoder_train_mode: parallel_teacher_forced
decoder_rollout_prob_mode: fixed
decoder_rollout_prob: 0.0
decoder_rollout_prob_start: 0.0
decoder_rollout_prob_end: 0.0
decoder_rollout_prob_ramp_epochs: 0
decoder_rollout_detach_predictions: true
