# install: conda env create -f environment.yaml
# update:  conda env update -f environment.yaml
# optional Phase 1.10 Mamba support: pip install -e .[dev,mamba]
# optional faster CUDA kernels: pip install -e .[dev,mamba-kernels]
name: torch_brain
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12.8
  - pip
  - pip:
      - -e .[dev]
